version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: citta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/citta
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_MONTHLY_PLAN_ID: ${RAZORPAY_MONTHLY_PLAN_ID}
      RAZORPAY_YEARLY_PLAN_ID: ${RAZORPAY_YEARLY_PLAN_ID}
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      NEXT_PUBLIC_RAZORPAY_MONTHLY_PLAN_ID: ${RAZORPAY_MONTHLY_PLAN_ID}
      NEXT_PUBLIC_RAZORPAY_YEARLY_PLAN_ID: ${RAZORPAY_YEARLY_PLAN_ID}
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  db-data:
